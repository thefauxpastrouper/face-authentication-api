<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelebA Face Auth Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --border-color: #334155;
            --accent-primary: #3b82f6;
            --accent-danger: #ef4444;
            --accent-success: #22c55e;
            --accent-warning: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .tabs {
            display: flex;
            gap: 1rem;
        }

        .tab-btn {
            background: transparent;
            color: #94a3b8;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 0.375rem;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: var(--bg-color);
        }
        
        .tab-btn[data-tab="fp"].active { background-color: var(--accent-danger); }
        .tab-btn[data-tab="tn"].active { background-color: var(--accent-success); }
        .tab-btn[data-tab="errors"].active { background-color: var(--accent-warning); }

        .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            padding: 0.125rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .card-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 0.875rem;
            color: #94a3b8;
            margin: 0 0 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }

        .identity-badge {
            background: var(--bg-color);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-family: monospace;
            border: 1px solid var(--border-color);
        }

        .attributes {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-top: 0.75rem;
        }

        .attr-badge {
            font-size: 0.65rem;
            background: #334155;
            color: #e2e8f0;
            padding: 0.125rem 0.375rem;
            border-radius: 999px;
            text-transform: capitalize;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: #94a3b8;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #94a3b8;
            grid-column: 1 / -1;
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px dashed var(--border-color);
        }

        [style*="display: none"] {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>CelebA Evaluation Dashboard</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="fp">False Positives <span class="count-badge" id="count-fp">0</span></button>
            <button class="tab-btn" data-tab="tn">True Negatives <span class="count-badge" id="count-tn">0</span></button>
            <button class="tab-btn" data-tab="errors">Errors <span class="count-badge" id="count-errors">0</span></button>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">Loading dashboard data...</div>
        
        <div id="grid-fp" class="grid" style="display: none;"></div>
        <div id="grid-tn" class="grid" style="display: none;"></div>
        <div id="grid-errors" class="grid" style="display: none;"></div>
    </main>

    <script>
        let dashboardData = { fp: [], tn: [], errors: [] };
        let activeTab = 'fp';

        // Interesting attributes to show as badges
        const interestingAttrs = [
            'Eyeglasses', 'Smiling', 'Wearing_Hat', 'Blurry', 
            'Male', 'Heavy_Makeup', 'Bald', 'Sideburns'
        ];

        async function init() {
            try {
                const response = await fetch('/dashboard_data.json');
                if (!response.ok) throw new Error('Data not found. Did you run the ETL script?');
                
                dashboardData = await response.json();
                
                document.getElementById('count-fp').textContent = dashboardData.fp.length;
                document.getElementById('count-tn').textContent = dashboardData.tn.length;
                document.getElementById('count-errors').textContent = dashboardData.errors.length;

                renderGrid('fp', dashboardData.fp);
                renderGrid('tn', dashboardData.tn);
                renderGrid('errors', dashboardData.errors);

                document.getElementById('loading').style.display = 'none';
                showTab(activeTab);

            } catch (err) {
                document.getElementById('loading').innerHTML = `
                    <div style="color: var(--accent-danger)">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 1rem">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg><br>
                        ${err.message}
                    </div>
                `;
            }
        }

        function createCard(item) {
            // Extract interesting attributes that are present (value = 1)
            const badges = interestingAttrs
                .filter(attr => item.attributes && item.attributes[attr] === 1)
                .map(attr => `<span class="attr-badge">${attr.replace(/_/g, ' ')}</span>`)
                .join('');

            return `
                <div class="card">
                    <img class="card-img" src="/data_bank/img_align_celeba/img_align_celeba/${item.fileName}" alt="${item.fileName}" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23334155\\'/><text x=\\'50\\' y=\\'50\\' font-family=\\'sans-serif\\' font-size=\\'12\\' fill=\\'%2394a3b8\\' text-anchor=\\'middle\\' alignment-baseline=\\'middle\\'>Image not found</text></svg>'">
                    <div class="card-content">
                        <p class="card-title">
                            <span title="File name">${item.fileName}</span>
                            <span class="identity-badge" title="Identity ID">ID: ${item.identity}</span>
                        </p>
                        <div class="attributes">
                            ${badges}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGrid(id, items) {
            const container = document.getElementById(`grid-${id}`);
            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>No images found in this category.</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = items.map(createCard).join('');
        }

        function showTab(tabId) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabId);
            });

            // Update grids
            document.querySelectorAll('.grid').forEach(grid => {
                grid.style.display = 'none';
            });
            document.getElementById(`grid-${tabId}`).style.display = 'grid';
            
            activeTab = tabId;
        }

        // Event listeners
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => showTab(e.currentTarget.dataset.tab));
        });

        // Start
        init();
    </script>
</body>
</html>
